name: Publish

# Manually triggered: builds a fully self-contained, single-file executable per OS
# (React UI embedded inside it - no separate wwwroot, no .NET runtime install needed)
# and attaches each as a downloadable build artifact on the run.
on:
  workflow_dispatch:

jobs:
  publish:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            artifact: Slopterm.Server.exe
          - rid: linux-x64
            os: ubuntu-latest
            artifact: Slopterm.Server
          - rid: osx-x64
            os: macos-latest
            artifact: Slopterm.Server
          - rid: osx-arm64
            os: macos-latest
            artifact: Slopterm.Server
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build front-end
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Publish self-contained single-file backend
        working-directory: server
        run: dotnet publish -c Release -r ${{ matrix.rid }}

      - uses: actions/upload-artifact@v4
        with:
          name: slopterm-${{ matrix.rid }}
          path: server/bin/Release/net8.0/${{ matrix.rid }}/publish/${{ matrix.artifact }}
